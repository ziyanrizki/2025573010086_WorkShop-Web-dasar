<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 1: Styling Komponen UI</title>
    <link rel="stylesheet" href="latihan-1.css">
</head>
<body>

    <h2>1. Tombol (Buttons)</h2>
    <div class="container">
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-outline">Outline</button>
    </div>

    <h2>2. Badge / Tag</h2>
    <div class="container">
        <span class="badge badge-blue">New</span>
        <span class="badge badge-purple">Feature</span>
        <span class="badge badge-orange">Hot</span>
    </div>

    <h2>3. Alert Box</h2>
    <div class="alert alert-success">✅ Pesan berhasil dikirim!</div>
    <div class="alert alert-warning">⚠️ Periksa kembali data Anda.</div>
    <div class="alert alert-error">❌ Terjadi kesalahan sistem.</div>

</body>
</html>
