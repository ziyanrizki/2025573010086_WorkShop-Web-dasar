<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animasi CSS</title>
    <link rel="stylesheet" href="animasi.css" />
  </head>
  <body>
    <h1>Transisi & Animasi</h1>

    <h2>Tombol Hover</h2>
    <div class="demo-tombol">
      <button class="btn-lift">Hover Saya ↑</button>
      <button class="btn-slide">Slide Effect →</button>
      <button class="btn-pulse">Pulse ●</button>
    </div>

    <h2>Card Hover</h2>
    <div class="kartu-hover">
      <div class="kartu">
        <div class="kartu-img"></div>
        <div class="kartu-body">
          <h3>Judul Produk</h3>
          <p>Deskripsi singkat produk di sini.</p>
          <button>Lihat Detail</button>
        </div>
      </div>

      <div class="kartu">
        <div class="kartu-img" style="background: #d5f5e3"></div>
        <div class="kartu-body">
          <h3>Produk Lain</h3>
          <p>Deskripsi produk kedua.</p>
          <button>Lihat Detail</button>
        </div>
      </div>
    </div>

    <h2>Animasi Keyframe</h2>
    <div class="demo-anim">
      <div class="bola"></div>
      <div class="spinner"></div>
      <div class="teks-animasi">Loading...</div>
    </div>
  </body>
</html>
