<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
<h1>Belajar css grid</h1>

<section class="grid-container">
    <div class="item1">1</div>
    <div class="item2">2</div>
    <div class="item3">3</div>
    <div class="item4">4</div>
    <div class="item5">5</div>
    <div class="item6">6</div>
</section>

<section class="halaman">
    <header class="T-header">header</header>
    <nav class="T-sidebar">sidebar</nav>
    <main class="T-konten">konten utama</main>
    <aside class="T-aside">aside</aside>
    <footer class="T-footer">footer</footer>
</section>

<section class="grid-otomatis">
    <div>A</div><div>B</div>
    <div>C</div><div>D</div>
    <div>E</div><div>F</div>
    <div>G</div><div>H</div>
</section>

<section class="galeri">
    <div class="H-besar">Foto Utama</div>
    <div>Image 2</div>
    <div>Image 3</div>
    <div>Image 4</div>
    <div class="H-lebar">banner panjang</div>
    <div>Image 6</div>
</section>


</body>
</html>
