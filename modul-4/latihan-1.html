<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Grid Layout</title>
  <link rel="stylesheet" href="latihan-1.css">
</head>
<body>

  <div class="container">
    <header class="header">
      <h2>Admin Dashboard</h2>
    </header>

    <aside class="sidebar">
      <nav>
        <ul>
          <li>Dashboard</li>
          <li>Statistik</li>
          <li>Pengaturan</li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <div class="stats-grid">
        <div class="card">Users: 120</div>
        <div class="card">Sales: $500</div>
        <div class="card">Orders: 45</div>
        <div class="card">Growth: +10%</div>
      </div>

      <div class="data-flex">
        <div class="area-tabel">Placeholder Tabel</div>
        <div class="area-grafik">Placeholder Grafik</div>
      </div>
    </main>
  </div>

</body>
</html>
