<!DOCTYPE html>

</head>
<body>

<h2>Tabel TI1C</h2>
<table>
    <tr><td>Zafir</td><td>85</td></tr>
    <tr><td>Randy</td><td>88</td></tr>

    <tr><td>Dodi</td><td>78</td></tr>

<h2>List tanpa border terakhir</h2>

        <li>Item Pertama</li>
        <li>Item Kedua</li>
        <li>Item Ketiga</li>
        <li>Item Terakhir</li>

<h2>Kartu dengan highlight ke-3</h2>
<div class="grid-kartu">
    <div>Kartu 1</div>
    <div>Kartu 2</div>
    <div>Kartu 3</div>
