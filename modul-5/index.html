<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CSS</title>
  </head>
<body class="bg-gray-50 min-h-screen p-8 font-sans">
  <section class="mb-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-4 pb-2
    border-b border-gray-200">
  Typography Scale
  </h2>
    <p class="text-xs text-gray-500 mb-1">text-xs — 12px</p>
    <p class="text-sm text-gray-500 mb-1">text-sm — 14px</p>
    <p class="text-base text-gray-700 mb-1">text-base — 16px (default)</p>
    <p class="text-lg text-gray-700 mb-1">text-lg — 18px</p>
    <p class="text-xl font-semibold text-gray-800 mb-1">text-xl — 20px</p>
    <p class="text-2xl font-bold text-blue-700 mb-1">text-2xl — 24px</p>
    <p class="text-4xl font-black text-blue-900">text-4xl — 36px</p>
  </section>

  <section class="mb-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-4 pb-2
    border-b border-gray-200">
    Spacing Demo
    </h2>
    <div class="flex gap-4 items-end flex-wrap">
    <div class="p-1 bg-blue-200 text-xs">p-1</div>
    <div class="p-2 bg-blue-300 text-xs">p-2</div>
    <div class="p-4 bg-blue-400 text-sm">p-4</div>
    <div class="p-6 bg-blue-500 text-white">p-6</div>
    <div class="p-8 bg-blue-600 text-white">p-8</div>
    </div>
  </section>

  <section>
    <h2 class="text-2xl font-bold text-gray-800 mb-4 pb-2
    border-b border-gray-200">
    Color Palette
    </h2>
    <div class="grid grid-cols-5 gap-2">
    <div class="bg-blue-100 p-3 rounded text-center text-xs">100</div>
    <div class="bg-blue-300 p-3 rounded text-center text-xs">300</div>
    <div class="bg-blue-500 p-3 rounded text-center text-white text-xs">500</div>
    <div class="bg-blue-700 p-3 rounded text-center text-white text-xs">700</div>
    <div class="bg-blue-900 p-3 rounded text-center text-white text-xs">900</div>
    </div>
</section>
</body>
    </button>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
