<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validasi</title>
    <link rel="stylesheet" href="form-validasi.css" />
  </head>
  <body>
    <div class="container">
      <h1>Daftar Akun</h1>
      <form id="form-registrasi" novalidate>
        <div class="field-grup" id="grup-nama">
          <label for="nama">Nama Lengkap</label>
          <input
            type="text"
            id="nama"
            name="nama"
            placeholder="Minimal 3 karakter"
          />
          <span class="pesan-error" id="error-nama"></span>
        </div>
        <div class="field-grup" id="grup-email">
          <label for="email">Email</label>

          <input
            type="email"
            id="email"
            name="email"
            placeholder="contoh@email.com"/>

          <span class="pesan-error" id="error-email"></span>
        </div>
        <div class="field-grup" id="grup-password">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Minimal 8 karakter"/>

          <span class="pesan-error" id="error-password"></span>
          <div class="indikator-kekuatan">
            <div class="bar" id="bar-kekuatan"></div> 
          </div>
          <span class="teks-kekuatan" id="teks-kekuatan"></span>
        </div>
        <div class="field-grup" id="grup-konfirmasi">
          <label for="konfirmasi">Konfirmasi Password</label>
          <input
            type="password"
            id="konfirmasi"
            name="konfirmasi"
            placeholder="Ulangi password"/>
            
          <span class="pesan-error" id="error-konfirmasi"></span>
        </div>
        <div class="field-grup" id="grup-telp">
          <label for="telp">Nomor Telepon</label>
          <input type="tel" id="telp" name="telp" placeholder="08xxxxxxxxxx" />
          <span class="pesan-error" id="error-telp"></span>
        </div>
        <div class="field-grup">
          <label class="label-checkbox">
            <input type="checkbox" id="setuju" name="setuju" />
            Saya setuju dengan <a href="#">syarat & ketentuan</a>
          </label>
          <span class="pesan-error" id="error-setuju"></span>
        </div>
        <button type="submit" id="btn-daftar">Buat Akun</button>
      </form>
      <div id="sukses" class="sukses tersembunyi">
        Akun berhasil dibuat! Selamat datang.
      </div>
    </div>
    <script src="form-validasi.js"></script>
  </body>
</html>
