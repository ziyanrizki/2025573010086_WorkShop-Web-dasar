<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kalkulator Interaktif</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .kalkulator {
        background: #1e293b;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        width: 260px;
      }

      #display {
        width: 100%;
        height: 50px;
        font-size: 24px;
        text-align: right;
        margin-bottom: 15px;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: #0f172a;
        color: #22c55e;
      }

      .tombol {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background: #334155;
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #475569;
      }

      button:active {
        transform: scale(0.95);
      }

      button[data-op] {
        background: #f59e0b;
      }

      button[data-op]:hover {
        background: #d97706;
      }

      button[data-equals] {
        background: #22c55e;
      }

      button[data-equals]:hover {
        background: #16a34a;
      }

      button[data-clear] {
        background: #ef4444;
      }

      button[data-clear]:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="kalkulator">
      <input type="text" id="display" disabled />

      <div class="tombol" id="buttons">
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-op="/">÷</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-op="*">×</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-op="-">-</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button data-equals="=">=</button>
        <button data-op="+">+</button>

        <button data-clear="C" style="grid-column: span 4">C</button>
      </div>
    </div>

    <script src="latihan-1.js"></script>
  </body>
</html>
