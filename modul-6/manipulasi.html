<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Manipulasi DOM</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }

      .aktif {
        background: #d5f5e3;
        border: 2px solid #27ae60;
        padding: 8px;
        border-radius: 4px;
      }

      .error {
        color: #e74c3c;
      }

      .tersembunyi {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1 id="judul">Judul Asli</h1>
    <p id="info">Info teks.</p>

    <img id="foto" src="https://picsum.photos/100/100" alt="Foto acak" />

    <div id="kotak">Kotak ini akan berubah.</div>

    <button id="btn-ubah">Ubah Semua</button>
    <button id="btn-toggle">Toggle Aktif</button>

    <script src="manipulasi.js"></script>
  </body>
</html>
